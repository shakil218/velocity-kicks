<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded Container with Dark Gradient -->
  <rect width="64" height="64" rx="18" fill="url(#bg-grad)"/>
  <rect width="64" height="64" rx="18" stroke="url(#border-grad)" stroke-width="2" stroke-opacity="0.4"/>
  
  <!-- Subtle Outer Glow -->
  <circle cx="32" cy="32" r="20" fill="#F97316" fill-opacity="0.25" filter="url(#glow)"/>

  <!-- Flame / Velocity Speed Kick Icon -->
  <g transform="translate(14, 13)">
    <!-- Main Outer Flame Path -->
    <path d="M18.8 35.8C25.6 35.8 31 30.6 31 24.2C31 16.5 22.8 11.2 20.1 2C19.8 0.9 18.2 0.9 17.9 2C16.8 6.4 14.5 10.2 11.2 13.4C8.2 16.3 6.6 20.2 6.6 24.2C6.6 30.6 12 35.8 18.8 35.8Z" fill="url(#flame-grad)"/>
    
    <!-- Inner Flame Highlight -->
    <path d="M18.8 32.8C22.6 32.8 25.6 29.8 25.6 26.2C25.6 21.8 21 18.8 19.5 13.6C19.3 13 18.3 13 18.1 13.6C17.5 16 16.2 18.2 14.4 20C12.7 21.6 11.8 23.8 11.8 26.2C11.8 29.8 15 32.8 18.8 32.8Z" fill="url(#inner-flame-grad)"/>
  </g>

  <!-- Definitions -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    
    <linearGradient id="border-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <linearGradient id="flame-grad" x1="6.6" y1="2" x2="31" y2="35.8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="0.5" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>

    <linearGradient id="inner-flame-grad" x1="11.8" y1="13" x2="25.6" y2="32.8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF08A"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>

    <filter id="glow" x="-4" y="-4" width="72" height="72" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
    </filter>
  </defs>
</svg>